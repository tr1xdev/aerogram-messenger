name: CI/CD Pipeline

on:
    push:
        branches: [main, master, develop]
    pull_request:
        branches: [main, master, develop]

jobs:
    quality-gate:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: backend

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_DB: aerogram_test
                    POSTGRES_HOST_AUTH_METHOD: trust
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25.x"
                  cache: true
                  cache-dependency-path: backend/go.sum

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
                  cache-dependency-path: backend/package-lock.json

            - name: Install dependencies
              run: |
                  go mod download
                  if [ -f "package.json" ]; then
                    npm ci
                  fi
              env:
                  GOWORK: off

            - name: Run Backend Tests
              run: go test -v ./...
              env:
                  GOWORK: off
                  APP_ENV: development
                  DATABASE_URL: postgres://postgres@localhost:5432/aerogram_test?sslmode=disable
                  REDIS_ADDR: localhost:6379
                  JWT_SECRET: ci_test_secret_key

            - name: Lint Go code
              uses: golangci/golangci-lint-action@v6
              with:
                  version: latest
                  working-directory: backend
                  args: --timeout=5m

            - name: Verify Docker Build
              working-directory: .
              run: |
                  docker compose build
              env:
                  JWT_SECRET: dummy_secret
                  RESEND_API_KEY: dummy_key
