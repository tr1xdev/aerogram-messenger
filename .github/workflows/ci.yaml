name: CI

on:
   push:
      branches: [main, master]
   pull_request:
      branches: [main, master]

jobs:
   backend:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4

         - name: Set up Go
           uses: actions/setup-go@v5
           with:
              go-version: "1.22"
              cache-dependency-path: backend/go.sum

         - name: Build Backend
           run: |
              go mod download
              go build -v -o server ./cmd/aerogram-api/main.go
           working-directory: ./backend

   frontend:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4

         - name: Set up Node
           uses: actions/setup-node@v4
           with:
              node-version: 20
              cache: "npm"
              cache-dependency-path: frontend/package-lock.json

         - name: Build Frontend
           run: |
              npm ci
              npm run build
           working-directory: ./frontend
