name: CI/CD Pipeline

on:
    push:
        branches: [main, master, develop, "refactor/*"]
    pull_request:
        branches: [main, master, develop]

jobs:
    quality-gate-backend:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: admin
                    POSTGRES_PASSWORD: admin
                    POSTGRES_DB: aerogram_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25.5"
                  cache: true
                  cache-dependency-path: backend/go.sum

            - name: Install Backend Dependencies
              working-directory: backend
              run: go mod download
              env:
                  GOWORK: off

            - name: Run Backend Tests
              working-directory: backend
              run: go test -v -p 1 -count=1 ./...
              env:
                  GOWORK: off
                  APP_ENV: development
                  DB_USER: admin
                  POSTGRES_PASSWORD: admin
                  DB_HOST: localhost
                  DB_NAME: aerogram_test
                  REDIS_ADDR: localhost:6379
                  JWT_SECRET: ci_test_secret_key

            - name: Lint Go code
              working-directory: backend
              run: |
                  sed -i 's/go 1.25.5/go 1.24/' go.mod
                  go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
                  $(go env GOPATH)/bin/golangci-lint run --timeout=10m
                  git checkout go.mod
              env:
                  GOWORK: off

    quality-gate-frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json
            - name: Install Frontend Dependencies
              working-directory: frontend
              run: npm ci
            - name: Lint Frontend
              working-directory: frontend
              run: npm run lint
            - name: Type Check
              working-directory: frontend
              run: npx tsc --noEmit

    verify-docker:
        needs: [quality-gate-backend, quality-gate-frontend]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Verify Docker Build
              run: docker compose build
              env:
                  JWT_SECRET: dummy_secret
                  RESEND_API_KEY: dummy_key
                  VITE_API_URL: http://localhost:8080
                  VITE_WS_URL: ws://localhost:8080
