name: CI

on:
   push:
      branches: [main, master]
   pull_request:
      branches: [main, master]

jobs:
   build:
      runs-on: ubuntu-latest

      services:
         postgres:
            image: postgres:15
            env:
               POSTGRES_USER: postgres
               POSTGRES_DB: aerogram_test
               POSTGRES_HOST_AUTH_METHOD: trust
            ports:
               - 5432:5432
            options: >-
               --health-cmd pg_isready
               --health-interval 10s
               --health-timeout 5s
               --health-retries 5

      steps:
         - uses: actions/checkout@v4

         - name: Set up Go
           uses: actions/setup-go@v5
           with:
              go-version: "1.22"
              cache-dependency-path: backend/go.sum

         - name: Set up Node
           uses: actions/setup-node@v4
           with:
              node-version: 20
              cache: "npm"
              cache-dependency-path: frontend/package-lock.json

         - name: Install dependencies
           run: make install-deps

         - name: Run Tests
           run: make test
           env:
              DATABASE_URL: postgres://postgres@localhost:5432/aerogram_test?sslmode=disable
              DB_USER: postgres
              DB_NAME: aerogram_test
              DB_HOST: localhost
              DB_PORT: 5432

         - name: Build Backend
           run: make build-backend

         - name: Build Frontend
           run: make build-frontend
