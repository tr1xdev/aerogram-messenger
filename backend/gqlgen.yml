schema:
   - internal/graph/*.graphqls

exec:
   package: graph
   layout: single-file
   filename: internal/graph/generated.go

model:
   filename: internal/graph/model/models_gen.go
   package: model

resolver:
   package: graph
   layout: follow-schema
   dir: internal/graph
   filename_template: "{name}.resolvers.go"

autobind:
   - "github.com/tr1xdev/aerogram-messenger/internal/models"
   - "github.com/tr1xdev/aerogram-messenger/internal/schemas"

models:
   Session:
      model: github.com/tr1xdev/aerogram-messenger/internal/models.Session
      fields:
         device:
            resolver: true
         location:
            resolver: true
         isCurrent:
            resolver: true
   User:
      fields:
         status:
            resolver: true
   Message:
      fields:
         sender:
            resolver: true
         sequence:
            resolver: true
   Long:
      model: github.com/99designs/gqlgen/graphql.Int64
