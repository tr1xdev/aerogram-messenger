schema:
    - internal/graph/schemas/*.graphqls

exec:
    package: graph
    layout: single-file
    filename: internal/graph/generated.go

model:
    filename: internal/graph/model/models_gen.go
    package: model

resolver:
    layout: follow-schema
    dir: internal/graph/resolvers
    package: resolvers
    filename_template: "{name}.resolvers.go"

models:
    ID:
        model:
            - github.com/99designs/gqlgen/graphql.ID
    Long:
        model:
            - github.com/99designs/gqlgen/graphql.Int64

    User:
        model: github.com/tr1xdev/aerogram-messenger/internal/database/sqlc/gen.User
        fields:
            id: { resolver: true }
            isTyping: { resolver: true }
            firstName: { resolver: true }
            lastName: { resolver: true }
            displayName: { resolver: true }
            photoUrl: { resolver: true }
            bio: { resolver: true }
            status: { resolver: true }

    Chat:
        model: github.com/tr1xdev/aerogram-messenger/internal/graph/model.ChatExtended
        fields:
            id: { resolver: true }
            type: { resolver: true }
            title: { resolver: true }
            photoUrl: { resolver: true }
            unreadCount: { resolver: true }
            myReadSequence: { resolver: true }
            lastReadSequence: { resolver: true }
            isPinned: { resolver: true }
            canWrite: { resolver: true }
            permissions: { resolver: true }
            lastMessage: { resolver: true }
            myRole: { resolver: true }

    Session:
        model: github.com/tr1xdev/aerogram-messenger/internal/database/sqlc/gen.Session
        fields:
            id: { resolver: true }

    Message:
        fields:
            id: { resolver: true }
            sender: { resolver: true }
            replyTo: { resolver: true }
            forwardedFrom: { resolver: true }
            attachments: { resolver: true }
