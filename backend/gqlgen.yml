schema:
   - internal/graph/schemas/*.graphqls

exec:
   package: graph
   layout: single-file
   filename: internal/graph/generated.go

model:
   filename: internal/graph/model/models_gen.go
   package: model

resolver:
   layout: follow-schema
   dir: internal/graph/resolvers
   package: resolvers
   filename_template: "{name}.go"

models:
   ID:
      model:
         - github.com/99designs/gqlgen/graphql.ID
   Long:
      model:
         - github.com/99designs/gqlgen/graphql.Int64

   User:
      model: github.com/tr1xdev/aerogram-messenger/internal/database/sqlc/gen.User
      fields:
         firstName: { resolver: true }
         lastName: { resolver: true }
         displayName: { resolver: true }
         photoUrl: { resolver: true }
         bio: { resolver: true }
         isVerified: { resolver: true }
         email: { resolver: true }
         status: { resolver: true }
         encryptedPrivKey: { resolver: true }
         encryptionIv: { resolver: true }

   Session:
      model: github.com/tr1xdev/aerogram-messenger/internal/database/sqlc/gen.Session
      fields:
         device: { resolver: true }
         location: { resolver: true }
         isCurrent: { resolver: true }

   Message:
      fields:
         sender: { resolver: true }

   Chat:
      fields:
         members: { resolver: false }
         lastMessage: { resolver: false }

   ChatMember:
      fields:
         user: { resolver: false }
