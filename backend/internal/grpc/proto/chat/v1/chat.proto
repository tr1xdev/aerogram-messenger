syntax = "proto3";

package chat.v1;

import "messages/v1/messages.proto";

option go_package = "github.com/tr1xdev/aerogram-messenger/internal/grpc/gen/chat/v1;chatv1";

service ChatService {
  rpc CreateChat(CreateChatRequest) returns (CreateChatResponse);
  rpc GetMyChats(GetMyChatsRequest) returns (GetMyChatsResponse);
  rpc PinChat(PinChatRequest) returns (PinChatResponse);
  rpc GetChat(GetChatRequest) returns (GetChatResponse);
  rpc DeleteChat(DeleteChatRequest) returns (DeleteChatResponse);
  rpc InviteToChat(InviteToChatRequest) returns (InviteToChatResponse);
  rpc JoinChatBySlug(JoinChatBySlugRequest) returns (JoinChatBySlugResponse);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (UpdateMemberRoleResponse);
  rpc UpdateChatPermissions(UpdateChatPermissionsRequest) returns (UpdateChatPermissionsResponse);
  rpc GetChatMembers(GetChatMembersRequest) returns (GetChatMembersResponse);
  rpc LeaveChat(LeaveChatRequest) returns (LeaveChatResponse);
  rpc RemoveChatMember(RemoveChatMemberRequest) returns (RemoveChatMemberResponse);
}

enum ChatType {
  CHAT_TYPE_UNSPECIFIED = 0;
  CHAT_TYPE_PRIVATE = 1;
  CHAT_TYPE_GROUP = 2;
  CHAT_TYPE_CHANNEL = 3;
}

message ChatPermissions {
  bool can_send_message = 1;
  bool can_invite_users = 2;
  bool can_edit_metadata = 3;
  bool can_delete_messages = 4;
  bool can_assign_admins = 5;
  bool can_send_media = 6;
  bool can_pin_messages = 7;
}

message ChatMember {
  string user_id = 1;
  string role = 2;
  ChatPermissions permissions = 3;
  int64 last_read_sequence = 4;
}

message Chat {
  string id = 1;
  ChatType type = 2;
  string title = 3;
  string slug = 4;
  int32 members_count = 5;
  string last_message_id = 6;
  int64 last_read_sequence = 7;
  string photo_url = 8;
  optional string bio = 9;
  optional string description = 10;
  bool is_verified = 11;
  optional string pinned_message_id = 12;
  bool is_pinned = 13;
  int32 unread_count = 14;
  messages.v1.Message last_message = 15;
  bool can_write = 16;
  ChatPermissions permissions = 17;
  string my_role = 18;
}

message JoinChatBySlugRequest {
  string slug = 1;
}

message JoinChatBySlugResponse {
  string chat_id = 1;
  bool success = 2;
}

message UpdateMemberRoleRequest {
  string chat_id = 1;
  string target_user_id = 2;
  string new_role = 3;
}

message UpdateMemberRoleResponse {
  bool success = 1;
}

message UpdateChatPermissionsRequest {
  string chat_id = 1;
  ChatPermissions permissions = 2;
}

message UpdateChatPermissionsResponse {
  bool success = 1;
}

message InviteToChatRequest {
  string chat_id = 1;
  repeated string user_ids = 2;
}

message InviteToChatResponse {
  bool success = 1;
}

message RemoveChatMemberRequest {
  string chat_id = 1;
  string user_id = 2;
}

message LeaveChatResponse {
  bool success = 1;
}

message LeaveChatRequest {
  string chat_id = 1;
}

message RemoveChatMemberResponse {
  bool success = 1;
}

message GetChatMembersRequest {
  string chat_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetChatMembersResponse {
  repeated ChatMember members = 1;
  int32 total_count = 2;
}

message DeleteChatRequest {
  string chat_id = 1;
  string user_id = 2;
  bool for_everyone = 3;
}

message DeleteChatResponse {
  bool success = 1;
}

message GetChatRequest {
  optional string chat_id = 1;
  optional string slug = 2;
  string user_id = 3;
}

message GetChatResponse {
  Chat chat = 1;
}

message CreateChatRequest {
  ChatType type = 1;
  repeated string participant_ids = 2;
  optional string title = 3;
  optional string slug = 4;
  string creator_id = 5;
}

message CreateChatResponse {
  Chat chat = 1;
}

message GetMyChatsRequest {
  string user_id = 1;
}

message GetMyChatsResponse {
  repeated Chat chats = 1;
}

message PinChatRequest {
  string chat_id = 1;
  string user_id = 2;
  bool pinned = 3;
}

message PinChatResponse {
  bool success = 1;
}
