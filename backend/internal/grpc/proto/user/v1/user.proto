syntax = "proto3";

package user.v1;

import "errors/v1/errors.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/tr1xdev/aerogram-messenger/internal/grpc/gen/user/v1;userv1";

service UserService {
  rpc UserInfo(UserInfoRequest) returns (UserInfoResponse);
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
}

message GetUsersRequest {
  repeated string ids = 1;
}

message GetUsersResponse {
  repeated User users = 1;
}

message SearchUsersRequest {
  string query = 1;
  bool global = 2;
}

message SearchUsersResponse {
  repeated User users = 1;
}

message User {
  string id = 1;
  string first_name = 2;
  optional string email = 3;
  optional string last_name = 4;
  optional string bio = 5;
  optional string username = 6;
  optional string is_premium = 7;
  optional google.protobuf.Timestamp created_at = 8;
  optional string public_key = 9;
  optional string encrypted_priv_key = 10;
  optional string encryption_iv = 11;
}

message UserInfoRequest {
  oneof identifier {
    string username = 1;
    string id = 2;
  }
}

message UserInfoResponse {
  oneof response {
    errors.v1.CommonError error = 1;
    User user = 2;
  }
}

message UpdateUserRequest {
  string id = 1;
  optional string first_name = 2;
  optional string last_name = 3;
  optional string username = 4;
  optional string public_key = 5;
  optional string encrypted_priv_key = 6;
  optional string encryption_iv = 7;
}

message UpdateUserResponse {
  oneof response {
    errors.v1.CommonError error = 1;
    User user = 2;
  }
}
