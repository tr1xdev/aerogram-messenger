syntax = "proto3";

package user.v1;

import "errors/v1/errors.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/tr1xdev/aerogram-messenger/internal/grpc/gen/user/v1;userv1";

service UserService {
  rpc UserInfo(UserInfoRequest) returns (UserInfoResponse);
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
  rpc CreateBot(CreateBotRequest) returns (CreateBotResponse);
}

message User {
  string id = 1;
  string first_name = 2;
  optional string email = 3;
  optional string last_name = 4;
  optional string bio = 5;
  optional string username = 6;
  bool is_premium = 7;
  bool is_verified = 8;
  bool is_email_verified = 9;
  optional google.protobuf.Timestamp created_at = 10;
  optional string photo_url = 11;
  bool is_bot = 12;
  optional string bot_token_hash = 13;
  optional string bot_owner_id = 14;
  optional string bot_description = 15;
  optional string bot_commands = 16;
}

message GetUsersRequest {
  repeated string ids = 1;
}

message GetUsersResponse {
  repeated User users = 1;
}

message SearchUsersRequest {
  string query = 1;
  bool global = 2;
}

message SearchUsersResponse {
  repeated User users = 1;
}

message UserInfoRequest {
  oneof identifier {
    string username = 1;
    string id = 2;
    string bot_token_hash = 3;
  }
}

message UserInfoResponse {
  oneof response {
    errors.v1.CommonError error = 1;
    User user = 2;
  }
}

message UpdateUserRequest {
  string id = 1;
  optional string first_name = 2;
  optional string last_name = 3;
  optional string username = 4;
  optional string photo_url = 5;
  optional string bot_description = 6;
  optional string bot_commands = 7;
}

message UpdateUserResponse {
  oneof response {
    errors.v1.CommonError error = 1;
    User user = 2;
  }
}

message CreateBotRequest {
  string username = 1;
  string first_name = 2;
  optional string last_name = 3;
  string owner_id = 4;
  optional string description = 5;
  optional string commands = 6;
}

message CreateBotResponse {
  oneof response {
    errors.v1.CommonError error = 1;
    string bot_token = 2;
    User user = 3;
  }
}
