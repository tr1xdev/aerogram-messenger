syntax = "proto3";

package presence.v1;

option go_package = "github.com/tr1xdev/aerogram-messenger/internal/grpc/gen/presence/v1;presencev1";

service PresenceService {
  rpc SetOnline(SetOnlineRequest) returns (SetOnlineResponse);
  rpc SetOffline(SetOfflineRequest) returns (SetOfflineResponse);
  rpc IsOnline(IsOnlineRequest) returns (IsOnlineResponse);
  rpc GetBulk(GetBulkRequest) returns (GetBulkResponse);
  rpc SubscribeTyping(SubscribeTypingRequest) returns (stream SubscribeTypingResponse);
}

message SetOnlineRequest {
  string user_id = 1;
}

message SetOnlineResponse {
  bool ok = 1;
}

message SetOfflineRequest {
  string user_id = 1;
}

message SetOfflineResponse {
  bool ok = 1;
}

message IsOnlineRequest {
  string user_id = 1;
}

message IsOnlineResponse {
  string status = 1;
}

message GetBulkRequest {
  repeated string user_ids = 1;
}

message GetBulkResponse {
  map<string, string> statuses = 1;
}

message SubscribeTypingRequest {
  string chat_id = 1;
}

message SubscribeTypingResponse {
  string payload = 1;
}
