syntax = "proto3";

package errors.v1;

option go_package = "github.com/tr1xdev/aerogram-messenger/internal/grpc/gen/errors/v1;errorsv1";

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_NOT_FOUND = 1;
  ERROR_CODE_UNAUTHORIZED = 2;
}

message CommonError {
  optional ErrorCode code = 1;
  string message = 2;
}
