syntax = "proto3";

package messages.v1;

option go_package = "github.com/aerogram-org/aerogram-api/internal/grpc/gen/messages/v1;messagespb";

service MessagesService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc UpdateMessage(UpdateMessageRequest) returns (UpdateMessageResponse);
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
  rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse);
}

message Message {
  string id = 1;
  string chat_id = 2;
  string sender_id = 3;
  string text = 4;
  string sent_at = 5;
  bool is_read = 6;
  bool is_edited = 7;
  optional string reply_to_id = 8;
  optional string forwarded_from_id = 9;
}

message SendMessageRequest {
  string chat_id = 1;
  string sender_id = 2;
  string text = 3;
  optional string reply_to_id = 4;
}

message SendMessageResponse {
  Message message = 1;
}

message UpdateMessageRequest {
  string id = 1;
  string sender_id = 2;
  string text = 3;
}

message UpdateMessageResponse {
  Message message = 1;
}

message DeleteMessageRequest {
  string id = 1;
  string sender_id = 2;
}

message DeleteMessageResponse {
  bool success = 1;
}

message GetHistoryRequest {
  string chat_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetHistoryResponse {
  repeated Message messages = 1;
}

message MarkAsReadRequest {
  string chat_id = 1;
  string user_id = 2;
  string last_message_id = 3;
}

message MarkAsReadResponse {
  bool success = 1;
}
