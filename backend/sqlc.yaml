version: "2"
sql:
   - schema: "internal/database/sqlc/migrations"
     queries: "internal/database/sqlc/queries"
     engine: "postgresql"
     gen:
        go:
           package: "dbgen"
           out: "internal/database/sqlc/gen"
           emit_json_tags: true
           emit_interface: true
           # use pointers for nulls to avoid sql.null types
           emit_pointers_for_null_types: true
           overrides:
              # use google uuid and let sqlc handle pointers via emit_pointers_for_null_types
              - db_type: "uuid"
                go_type: "github.com/google/uuid.UUID"
