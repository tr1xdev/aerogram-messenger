version: "2"
sql:
   - schema: "internal/database/sqlc/migrations"
     queries: "internal/database/sqlc/queries"
     engine: "postgresql"
     gen:
        go:
           package: "dbgen"
           out: "internal/database/sqlc/gen"
           emit_json_tags: true
           emit_interface: true
           emit_exact_table_names: false
