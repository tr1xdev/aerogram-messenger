version: "2"
sql:
   - schema: "internal/database/sqlc/migrations"
     queries: "internal/database/sqlc/queries"
     engine: "postgresql"
     gen:
        go:
           package: "dbgen"
           out: "internal/database/sqlc/gen"
           emit_json_tags: true
           emit_interface: true
           emit_pointers_for_null_types: true
           overrides:
              - db_type: "uuid"
                go_type: "github.com/google/uuid.UUID"
              - db_type: "timestamptz"
                go_type: "time.Time"
              - db_type: "timestamp"
                go_type: "time.Time"
              - db_type: "bigint"
                go_type: "int64"
