app:
    env: ${APP_ENV:-development} # Application mode: development, production
    test_email: ${TEST_EMAIL} # Email for dev mode redirects

server:
    http:
        host: "0.0.0.0" # IP address to bind (0.0.0.0 for all interfaces)
        port: ${HTTP_PORT:-8080} # HTTP server port
        timeout:
            read: 5s # Max duration for reading the request
            write: 10s # Max duration for writing the response
            idle: 120s # Max time to wait for the next request
    grpc:
        host: "0.0.0.0" # IP address to bind
        port: ${GRPC_PORT:-50051} # gRPC server port

database:
    postgres:
        host: ${DB_HOST:-localhost} # PostgreSQL host
        port: ${DB_PORT:-5432} # PostgreSQL port
        user: ${DB_USER:-your_user} # Database user
        password: ${DB_PASSWORD} # Database password (from .env)
        dbname: ${DB_NAME:-your_db} # Database name
        sslmode: ${DB_SSL:-disable} # SSL mode: disable, require, verify-full
        max_open_conns: ${DB_MAX_OPEN:-25} # Max active connections
    redis:
        host: ${REDIS_HOST:-localhost} # Redis host
        port: ${REDIS_PORT:-6379} # Redis port
        db: ${REDIS_DB:-0} # Redis database index (0-15)
        password: ${REDIS_PASSWORD} # Redis password (from .env)

auth:
    jwt:
        secret: ${JWT_SECRET} # Secret for signing (from .env)
        ttl_minutes: ${JWT_TTL:-60} # Access token lifetime in minutes
    two_fa:
        enabled: ${ENABLE_2FA:-false} # Master flag for 2FA availability
        on_sign_up: ${2FA_ON_SIGN_UP:-false} # Trigger 2FA during registration
        on_sign_in: ${2FA_ON_SIGN_IN:-false} # Trigger 2FA during login

ratelimit:
    auth:
        signup:
            limit: 5 # Requests allowed
            window: 1h # Time window (e.g., 1h, 15m)
        login:
            limit: 5 # Requests allowed
            window: 15m # Time window
        verify:
            limit: 3 # Requests allowed
            window: 5m # Time window
