<!doctype html>
<html>
   <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   </head>
   <body
      style="
         margin: 0;
         padding: 0;
         font-family: &quot;Segoe UI&quot;, Tahoma, Geneva, Verdana, sans-serif;
         background-color: #f9f9f9;
      "
   >
      <div
         style="
            max-width: 400px;
            margin: 20px auto;
            background-color: #ffffff;
            border-radius: 12px;
            border: 1px solid #eeeeee;
            padding: 32px;
            text-align: center;
         "
      >
         <h2 style="margin-top: 0; color: #1a1a1a">Verification Code</h2>
         <p style="color: #666666; font-size: 16px">
            Hello {{.FirstName}}, use the code below to sign in to Aerogram:
         </p>
         <div
            style="
               margin: 32px 0;
               padding: 16px;
               background-color: #f3f4f6;
               border-radius: 8px;
               font-size: 32px;
               font-weight: bold;
               letter-spacing: 6px;
               color: #2563eb;
            "
         >
            {{.Code}}
         </div>
         <p style="color: #9ca3af; font-size: 14px; margin-bottom: 0">
            If you didn't request this code, you can safely ignore this email.
         </p>
      </div>
   </body>
</html>
